services:
  opencode-server:
    image: node:20-slim
    env_file:
      - path: .env.local
        required: true
    environment:
      # OpenCode reads its own env var names — map from our config
      OPENCODE_ZEN_API_KEY: ${PHIXR_SANDBOX_PROVIDER_API_KEY:-}
    command: >
      bash -c "
        npm install -g opencode-ai@latest &&
        opencode serve --hostname 0.0.0.0 --port 4096
      "
    ports:
      - "4096:4096"
    networks:
      - phixr-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4096/global/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    profiles:
      - full-stack
    restart: unless-stopped

  phixr:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: phixr:latest
    networks:
      - phixr-network
    ports:
      - "8000:8000"
    env_file:
      - path: .env.local
        required: true
    environment:
      # Docker-network overrides (these override .env.local values)
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      OPENCODE_SERVER_URL: http://opencode-server:4096
      PHIXR_API_URL: http://phixr:8000
      WEBHOOK_URL: http://phixr:8000/webhooks/gitlab
      REDIS_URL: redis://redis:6379/0
      PHIXR_SANDBOX_OPENCODE_SERVER_URL: http://opencode-server:4096
      PHIXR_SANDBOX_REDIS_URL: redis://redis:6379/1
    depends_on:
      opencode-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app:Z
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/podman/podman.sock:/run/podman/podman.sock:Z
    profiles:
      - full-stack

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: phixr
      POSTGRES_PASSWORD: phixr
      POSTGRES_DB: phixr
    ports:
      - "5432:5432"
    networks:
      - phixr-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles:
      - full-stack

  redis:
    image: docker.io/library/redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - phixr-network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - full-stack

volumes:
  postgres_data:
  redis_data:

networks:
  phixr-network:
    name: phixr-network
    driver: bridge
