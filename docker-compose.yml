services:
  opencode-server:
    image: node:20-slim
    working_dir: /app
    environment:
      OPENCODE_ZEN_API_KEY: ${OPENCODE_ZEN_API_KEY:-}
    command: >
      bash -c "
        npm install -g opencode-ai@latest &&
        opencode serve --hostname 0.0.0.0 --port 4096
      "
    ports:
      - "4096:4096"
    networks:
      - phixr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:4096/global/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    profiles:
      - phase-2
    restart: unless-stopped

  phixr-bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: phixr-bot:latest
    networks:
      - phixr-network
    ports:
      - "8000:8000"
    env_file:
      - path: .env.local
        required: true
    environment:
      # Core configuration
      GITLAB_BOT_TOKEN: ${GITLAB_BOT_TOKEN:-}
      GITLAB_ROOT_TOKEN: ${GITLAB_ROOT_TOKEN:-}
      BOT_USERNAME: ${BOT_USERNAME:-phixr-bot}
      BOT_EMAIL: ${BOT_EMAIL:-phixr-bot@localhost}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # Server configuration
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      
      # Service URLs - configured for Docker network
      GITLAB_URL: ${GITLAB_URL:-http://host.docker.internal:8080}
      OPENCODE_SERVER_URL: ${OPENCODE_SERVER_URL:-http://opencode-server:4096}
      PHIXR_API_URL: ${PHIXR_API_URL:-http://phixr-bot:8000}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://phixr-bot:8000/webhooks/gitlab}
      
      # Database and cache - using service names for Docker network
      POSTGRES_URL: ${POSTGRES_URL:-postgresql://phixr:phixr@postgres:5432/phixr}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      
      # Webhook security
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-phixr-webhook-secret}
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: phixr
      POSTGRES_PASSWORD: phixr
      POSTGRES_DB: phixr
    ports:
      - "5432:5432"
    networks:
      - phixr-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - phixr-network
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

networks:
  phixr-network:
    name: phixr-network
    driver: bridge
