[pytest]
# Pytest configuration for Phixr tests

minversion = 7.0

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (require Docker/services)
    asyncio: Async tests
    slow: Slow running tests
    docker: Tests requiring Docker
    sandbox: Sandbox system tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage
testpaths = tests

# Timeout for tests (30 seconds default)
timeout = 30

# Asyncio mode
asyncio_mode = auto
