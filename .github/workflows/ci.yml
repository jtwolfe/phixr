name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-timeout respx

      - name: Run unit tests with coverage
        run: pytest tests/unit/ --cov=phixr --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check all Python files compile
        run: python -m compileall phixr/ -q

      - name: Verify key imports
        run: |
          python -c "
          import phixr.config.settings
          import phixr.config.sandbox_config
          import phixr.handlers.comment_handler
          import phixr.integration.opencode_integration_service
          import phixr.bridge.opencode_client
          import phixr.commands.parser
          print('All imports OK')
          "
