<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <style>
    :root {
      --bg: #ffffff;
      --text: #24292e;
      --text-secondary: #586069;
      --link: #0366d6;
      --border: #e1e4e8;
      --code-bg: #f6f8fa;
      --nav-bg: #fafbfc;
      --accent: #6f42c1;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --text: #c9d1d9;
        --text-secondary: #8b949e;
        --link: #58a6ff;
        --border: #30363d;
        --code-bg: #161b22;
        --nav-bg: #161b22;
        --accent: #bc8cff;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }

    .wrapper {
      display: flex;
      max-width: 1200px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      padding: 2rem 1.5rem;
      border-right: 1px solid var(--border);
      background: var(--nav-bg);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar .logo {
      display: block;
      width: 80px;
      height: 80px;
      border-radius: 12px;
      margin-bottom: 1rem;
    }

    .sidebar h1 {
      font-size: 1.3rem;
      margin-bottom: 0.25rem;
    }

    .sidebar .tagline {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }

    .sidebar nav a {
      display: block;
      padding: 0.4rem 0.75rem;
      margin: 0.15rem 0;
      color: var(--text);
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .sidebar nav a:hover {
      background: var(--border);
    }

    .sidebar nav a.active {
      background: var(--accent);
      color: #fff;
    }

    /* Main content */
    .content {
      flex: 1;
      padding: 2rem 3rem;
      max-width: 800px;
      min-width: 0;
    }

    .content h1 { font-size: 2rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    .content h2 { font-size: 1.5rem; margin-top: 2rem; margin-bottom: 0.75rem; }
    .content h3 { font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 0.5rem; }

    .content p { margin-bottom: 1rem; }
    .content ul, .content ol { margin-bottom: 1rem; padding-left: 2rem; }
    .content li { margin-bottom: 0.25rem; }

    .content a { color: var(--link); text-decoration: none; }
    .content a:hover { text-decoration: underline; }

    .content code {
      background: var(--code-bg);
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
    }

    .content pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      margin-bottom: 1rem;
    }

    .content pre code {
      background: none;
      padding: 0;
    }

    .content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1rem;
    }

    .content th, .content td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }

    .content th {
      background: var(--code-bg);
      font-weight: 600;
    }

    .content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .content img {
      max-width: 100%;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .wrapper { flex-direction: column; }
      .sidebar {
        width: 100%;
        height: auto;
        position: static;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 1rem;
      }
      .sidebar .logo { width: 48px; height: 48px; }
      .sidebar nav { display: flex; flex-wrap: wrap; gap: 0.25rem; }
      .sidebar nav a { padding: 0.3rem 0.6rem; }
      .content { padding: 1.5rem; }
    }

    /* Footer */
    .footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <aside class="sidebar">
      {% if site.logo %}
      <img src="{{ site.logo }}" alt="{{ site.title }}" class="logo">
      {% endif %}
      <h1>{{ site.title }}</h1>
      <p class="tagline">{{ site.description }}</p>
      <nav>
        {% for item in site.nav %}
        <a href="{{ site.baseurl }}{{ item.url }}"
           {% if page.url == item.url %}class="active"{% endif %}>
          {{ item.title }}
        </a>
        {% endfor %}
      </nav>
    </aside>
    <main class="content">
      {{ content }}
      <div class="footer">
        <p>Phixr &mdash; Seamless GitLab-AI Integration</p>
      </div>
    </main>
  </div>
</body>
</html>
